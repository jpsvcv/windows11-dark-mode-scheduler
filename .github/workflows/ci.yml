name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  powershell-lint:
    name: PowerShell Lint
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install PowerShell Script Analyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -AllowClobber

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $paths = @(
            '.\\scripts\\install.ps1',
            '.\\scripts\\uninstall.ps1',
            '.\\scripts\\check-tasks.ps1',
            '.\\src\\Win11DarkMode.psm1'
          )
          Invoke-ScriptAnalyzer -Path $paths

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path . -Include *.ps1,*.psm1 -Recurse | ForEach-Object {
            $content = Get-Content -Raw -LiteralPath $_.FullName
            $errors = @()
            [System.Management.Automation.Language.Parser]::ParseInput($content, [ref]$errors, [ref]$null) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Host
              throw "Syntax errors were detected in $($_.FullName)"
            }
          }
